<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OneMinPay Admin</title>
    <meta name="theme-color" content="#00a76f" />
    <link rel="manifest" href="./manifest-admin.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <meta http-equiv="refresh" content="1; url=./index.html?role=admin" />
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, "Microsoft YaHei", sans-serif; background: #f4f7f6; color: #17201c; }
      main { width: min(420px, 88vw); padding: 28px; border: 1px solid #dce6e1; border-radius: 8px; background: #fff; box-shadow: 0 16px 40px rgba(20, 54, 42, .09); }
      .mark { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 8px; background: #00a76f; color: #fff; font-size: 24px; font-weight: 800; }
      h1 { margin: 18px 0 8px; font-size: 26px; }
      p { margin: 0 0 18px; color: #65736d; line-height: 1.6; }
      .bar { height: 6px; overflow: hidden; border-radius: 999px; background: #eef6f2; }
      .bar::before { content: ""; display: block; width: 45%; height: 100%; border-radius: inherit; background: #00a76f; animation: load 1s ease-in-out infinite alternate; }
      a { display: inline-block; margin-top: 18px; color: #007f58; font-weight: 700; text-decoration: none; }
      @keyframes load { from { transform: translateX(-20%); } to { transform: translateX(150%); } }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">1</div>
      <h1>OneMinPay Admin</h1>
      <p>Opening admin console, approvals, reports, risk, support and settings.</p>
      <div class="bar"></div>
      <a href="./index.html?role=admin">Open now</a>
    </main>
    <script>
      window.setTimeout(() => window.location.replace("./index.html?role=admin"), 600);
    </script>
  </body>
</html>
